name: ride_sharing_user_app
description: A ride sharing Flutter project.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  http: ^1.2.1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Firebase
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.3
  firebase_crashlytics: ^4.0.3

  # Permissions / Notifications / Location
  flutter_local_notifications: ^17.2.1+2
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  location: ^7.0.0
  connectivity_plus: ^6.0.3

  # UI Widgets
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_switch: ^0.3.2
  flutter_spinkit: ^5.2.1
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  expandable_bottom_sheet: ^1.1.1+1
  expandable: ^5.0.1
  sliding_up_panel: ^2.0.0+1
  modal_bottom_sheet: ^3.0.0
  flutter_rating_bar: ^4.0.1
  card_swiper: ^3.0.1
  showcaseview: ^3.0.0
  just_the_tooltip: ^0.0.12
  flutter_animated_button: ^2.0.3
  readmore: ^3.0.0
  pin_code_fields: ^8.0.1
  dropdown_button2: ^2.3.9
  lottie: ^3.1.2
  app_settings: ^5.1.1
  fluttertoast: ^8.2.12

  # Maps & Location
  google_maps_flutter: ^2.7.0
  flutter_animarker: ^3.2.0
  flutter_polyline_points: ^2.1.0
  custom_map_markers: ^0.0.2+1

  # Media
  image_picker: ^1.1.2
  screenshot: ^3.0.0
  audioplayers: ^6.0.0

  # Web & Networking
  url_launcher: ^6.3.0
  web_socket_channel: ^2.4.0
  flutter_inappwebview: ^6.0.0

  # Inputs / Pickers
  syncfusion_flutter_datepicker: ^26.1.42
  country_code_picker: ^3.0.0
  flutter_typeahead: ^5.2.0
  file_picker: ^8.0.6

  # HTML Rendering
  flutter_html: ^3.0.0-beta.2
  flutter_widget_from_html_core: ^0.15.2

  # Slidable
  flutter_slidable: ^3.1.2

  # Dart packages
  dart_pusher_channels: ^1.2.2+1
  vibration: ^3.1.3
  fl_chart: ^0.68.0
  pinenacl: 0.6.0

  flutter_downloader: ^1.11.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1  # 🔧 App icon generation


dependency_overrides:
  flutter_plugin_android_lifecycle: ^2.0.6

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/svg/
    - assets/map/
    - assets/

  fonts:
    - family: SFProText
      fonts:
        - asset: assets/font/sf-pro-text-light.ttf
          weight: 300
        - asset: assets/font/sf-pro-text-regular.ttf
          weight: 400
        - asset: assets/font/sf-pro-text-medium.ttf
          weight: 500
        - asset: assets/font/sf-pro-text-semibold.ttf
          weight: 600
        - asset: assets/font/sf-pro-text-bold.ttf
          weight: 700
        - asset: assets/font/sf-pro-text-heavy.ttf
          weight: 900

# App Icon Configuration (must be at root level, not nested under flutter)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/image/appicon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/image/appicon.png"
